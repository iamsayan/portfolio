<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecdd3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background with accent gradient -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="30" height="15" rx="6" fill="white" opacity="0.08"/>
  <!-- Letter S centered -->
  <text
    x="16"
    y="23"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="19"
    font-weight="800"
    fill="url(#letter)"
    text-anchor="middle"
    letter-spacing="-0.5"
  >S</text>
</svg>
